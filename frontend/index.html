<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- 字体自托管于 /fonts/，由 src/fonts.css 经 Tailwind 构建注入；
         不再依赖 fonts.googleapis.com / gstatic.com，避免中国大陆访问阻塞。
         首屏预取使用最频繁的 Inter 400/latin，降低 CLS。 -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2"
      crossorigin
    />
    <script>
      const savedTheme = localStorage.getItem('zora-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const shouldUseDark = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);
      document.documentElement.classList.toggle('dark', shouldUseDark);
      document.documentElement.dataset.theme = savedTheme || 'system';
    </script>
    <title>Zora Blog</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
