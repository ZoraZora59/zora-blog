# Zora Blog Nginx 配置
# 放置于 /www/server/panel/vhost/nginx/www.zorazora.cn.conf
# 证书必须同时覆盖 www.zorazora.cn 和 zorazora.cn
# 仅 *.zorazora.cn 不覆盖根域名，会导致 https://zorazora.cn 被浏览器标记为不安全
#
# 前置依赖：
# - 需要启用 ngx_brotli 模块（宝塔可在"应用 → Nginx → 模块"中安装，或编译 --add-module=ngx_brotli）
# - 未安装 brotli 模块时，删除/注释 brotli_* 指令即可，只走 gzip

upstream zora_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# ---- 静态资源缓存策略（map 避免正则重复匹配）----
map $sent_http_content_type $zora_cache_control {
    default                                 "public, max-age=3600";
    ~*application/javascript                "public, max-age=31536000, immutable";
    ~*text/css                              "public, max-age=31536000, immutable";
    ~*font/                                 "public, max-age=31536000, immutable";
    ~*application/font                      "public, max-age=31536000, immutable";
    ~*image/(png|jpe?g|gif|svg\+xml|webp|x-icon)  "public, max-age=2592000";
}

server {
    listen 80;
    server_name zorazora.cn www.zorazora.cn;
    return 301 https://www.zorazora.cn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zorazora.cn;

    ssl_certificate /www/server/panel/vhost/cert/www.zorazora.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.zorazora.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://www.zorazora.cn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.zorazora.cn;

    ssl_certificate /www/server/panel/vhost/cert/www.zorazora.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.zorazora.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /www/wwwroot/zora-blog/frontend/dist;
    index index.html;

    access_log /www/wwwlogs/zora-blog.access.log;
    error_log /www/wwwlogs/zora-blog.error.log;

    # ---- 全局安全头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP：允许自域名 + 七牛 CDN + CDN 字体；如需 GA/埋点再按需放行
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.zorazora.cn; font-src 'self' data:; connect-src 'self' https://cdn.zorazora.cn; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml application/xml+rss application/rss+xml application/atom+xml image/svg+xml font/ttf font/otf;

    # ---- Brotli（若模块存在则生效）----
    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml application/xml+rss application/rss+xml application/atom+xml image/svg+xml font/ttf font/otf;

    # ---- SEO 基础文件：精确命中物理文件，禁止被 SPA fallback 吞掉 ----
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ---- 后端上传的文件 ----
    location /uploads/ {
        alias /www/wwwroot/zora-blog/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # ---- API 代理 ----
    location /api/ {
        proxy_pass http://zora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- 带哈希指纹的构建产物：一年 immutable 缓存 ----
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---- 自托管字体 ----
    location ^~ /fonts/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ---- 其他静态资源：按 MIME 动态套用缓存策略 ----
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        add_header Cache-Control $zora_cache_control always;
        try_files $uri =404;
    }

    # ---- HTML：不缓存，避免部署后用户拿旧壳 ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # ---- SPA 路由 fallback；预渲染脚本会先把 /articles/:slug/index.html 生成为物理文件 ----
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
