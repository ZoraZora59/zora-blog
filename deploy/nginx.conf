# Zora Blog Nginx 配置
# 放置于 /www/server/panel/vhost/nginx/www.zorazora.cn.conf

upstream zora_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name www.zorazora.cn zorazora.cn;

    # SSL 配置（宝塔自动管理）
    ssl_certificate /www/server/panel/vhost/cert/www.zorazora.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.zorazora.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 网站根目录（前端静态文件）
    root /www/wwwroot/zora-blog/frontend/dist;
    index index.html;

    # 日志
    access_log /www/wwwlogs/zora-blog.access.log;
    error_log /www/wwwlogs/zora-blog.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml;

    # 上传文件目录（后端存储）
    location /uploads/ {
        alias /www/wwwroot/zora-blog/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理
    location /api/ {
        proxy_pass http://zora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
