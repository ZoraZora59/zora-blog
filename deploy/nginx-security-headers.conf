# Zora Blog 安全响应头片段
# nginx 的 add_header 在任一 location 内重声明后即不再继承上层 add_header，
# 因此所有需要返回安全头的 location 都需要 include 本文件。
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.zorazora.cn; font-src 'self' data:; connect-src 'self' https://cdn.zorazora.cn; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
